<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<style>
  @page {
    size: A4;
    margin: 2.5cm 2cm 2cm 2cm;
    @bottom-center {
      content: "Página " counter(page) " de " counter(pages);
      font-size: 9px;
      color: #64748B;
    }
  }
  body {
    font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
    font-size: 11px;
    line-height: 1.5;
    color: #1E293B;
  }
  .header {
    border-bottom: 2px solid #3B82F6;
    padding-bottom: 10px;
    margin-bottom: 20px;
  }
  .header img { max-height: 50px; }
  .header h1 { font-size: 16px; margin: 0; color: #0F172A; }
  .header .meta { font-size: 10px; color: #64748B; }
  table { width: 100%; border-collapse: collapse; margin: 10px 0; }
  th, td { border: 1px solid #CBD5E1; padding: 6px 8px; text-align: left; }
  th { background: #F1F5F9; font-weight: 600; }
  .firma-table { margin-top: 30px; }
  .firma-table td { height: 50px; vertical-align: bottom; }
  .watermark {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-30deg);
    font-size: 60px;
    color: rgba(239, 68, 68, 0.15);
    font-weight: 900;
    z-index: -1;
  }
  .footer {
    margin-top: 20px;
    font-size: 9px;
    color: #94A3B8;
    text-align: center;
  }
</style>
</head>
<body>
  {% if doc and doc.estado == 'obsoleto' %}
  <div class="watermark">OBSOLETO</div>
  {% endif %}
  {% block content %}{% endblock %}
</body>
</html>
